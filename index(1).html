<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAE 204</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e5e1d8;
      --text: #1a1a18;
      --muted: #888680;
      --accent: #2d6a4f;
      --serif: 'DM Serif Display', serif;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1.1rem 2.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .nav-link {
      font-size: .85rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
    }

    .nav-link:hover, .nav-link.active { color: var(--text); }

    .nav-link.active {
      color: var(--text);
      border-bottom: 1.5px solid var(--accent);
      padding-bottom: 1px;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 2.5rem;
      max-width: 640px;
    }

    .hero-title {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -.01em;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .hero-sub {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 380px;
    }

    .hero-line {
      width: 2.5rem;
      height: 2px;
      background: var(--accent);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-link active" href="index.html">Accueil</a>
    <a class="nav-link" href="programmes.html">Programmes</a>
  </nav>

  <section class="hero">
    <div class="hero-line"></div>
    <h1 class="hero-title">SAE 204</h1>
    <p class="hero-sub">Voici tous les programmes utilisés pour cette SAE.</p>
  </section>

</body>
</html>
